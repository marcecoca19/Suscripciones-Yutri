<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Suscripciones</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#F7F7F5;color:#2C2C2A;min-height:100vh}
.topnav{background:#1D9E75;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.topnav h1{color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.topnav-actions{display:flex;gap:8px}
.main{padding:20px 24px;max-width:1200px;margin:0 auto}
.btn{padding:7px 14px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#2C2C2A;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:Arial,sans-serif}
.btn:hover{background:#f0f0ee}
.btn-green{background:#1D9E75;border-color:#1D9E75;color:#fff}
.btn-green:hover{background:#0F6E56;border-color:#0F6E56}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{color:#A32D2D;border-color:#F09595}
.btn-danger:hover{background:#FCEBEB}
.filters{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;background:#fff;border:1px solid #e8e8e5;border-radius:8px;padding:10px 14px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.metric{background:#fff;border-radius:8px;padding:12px 14px;border:1px solid #e8e8e5}
.metric .lbl{font-size:11px;color:#888780;margin-bottom:4px}
.metric .val{font-size:24px;font-weight:700}
.metric.m-green .val{color:#1D9E75}
.metric.m-orange .val{color:#BA7517}
.metric.m-red .val{color:#A32D2D}
.metric.m-blue .val{color:#185FA5}
.metric.m-gray .val{color:#5F5E5A}
.tabs{display:flex;border-bottom:2px solid #e8e8e5;margin-bottom:16px;gap:0;overflow-x:auto}
.tab{padding:9px 18px;font-size:13px;cursor:pointer;color:#888780;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-weight:500}
.tab.active{color:#1D9E75;border-bottom-color:#1D9E75}
.tab:hover:not(.active){color:#2C2C2A}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{padding:7px 10px;border-radius:6px;border:1px solid #ccc;font-size:13px;font-family:Arial,sans-serif;background:#fff;color:#2C2C2A}
.toolbar input{width:200px}
table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e8e8e5}
thead{background:#2C2C2A}
th{text-align:left;padding:10px 12px;color:#fff;font-size:12px;font-weight:600;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #f0f0ee;color:#2C2C2A;vertical-align:middle}
td.nowrap{white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
tr.row-red td{background:#FCEBEB}
tr.row-red:hover td{background:#f8e0e0}
tr.row-orange td{background:#FAEEDA}
tr.row-orange:hover td{background:#f5e4c8}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.b-prueba{background:#FAEEDA;color:#854F0B}
.b-semanal{background:#E1F5EE;color:#0F6E56}
.b-mensual{background:#E6F1FB;color:#185FA5}
.b-personal{background:#EEEDFE;color:#3C3489}
.b-activa{background:#EAF3DE;color:#3B6D11}
.b-finalizada{background:#F1EFE8;color:#5F5E5A}
.b-vence{background:#FAECE7;color:#993C1D}
.b-hoy{background:#FCEBEB;color:#A32D2D}
.progress-wrap{display:flex;align-items:center;gap:6px}
.pbar{height:6px;background:#e8e8e5;border-radius:3px;flex:1;min-width:50px;overflow:hidden}
.pfill{height:100%;border-radius:3px;background:#1D9E75}
.pfill.low{background:#E24B4A}
.plbl{font-size:11px;color:#888780;white-space:nowrap}
.empty{text-align:center;padding:40px;color:#aaa;font-size:14px;background:#fff;border-radius:8px;border:1px solid #e8e8e5}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:540px;margin:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h2{font-size:16px;font-weight:700;margin-bottom:18px;color:#2C2C2A}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg label{font-size:12px;color:#888780;font-weight:600}
.fg input,.fg select,.fg textarea{padding:8px 10px;border-radius:6px;border:1px solid #ccc;font-size:13px;font-family:Arial,sans-serif;color:#2C2C2A;background:#fff}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.12)}
.fg textarea{min-height:65px;resize:vertical}
.fg input[readonly]{background:#F7F7F5;color:#888780}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid #f0f0ee}
.modal-section-label{font-size:11px;font-weight:700;color:#888780;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.rtags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.rtag{background:#EEEDFE;color:#3C3489;border-radius:10px;padding:3px 8px;font-size:12px;display:flex;align-items:center;gap:4px}
.rtag button{background:none;border:none;cursor:pointer;color:#534AB7;font-size:14px;line-height:1;padding:0}
.rinput{display:flex;gap:6px;margin-top:5px}
.rinput input{flex:1}
/* DETAIL */
.detail{background:#fff;border-radius:8px;border:1px solid #e8e8e5;padding:20px}
.detail-hdr{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.avatar{width:44px;height:44px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#0F6E56;flex-shrink:0}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.dk{font-size:11px;color:#888780;margin-bottom:2px}
.dv{font-size:13px;font-weight:600;color:#2C2C2A;word-break:break-word}
.info-box{background:#F7F7F5;border-radius:6px;padding:10px 12px;font-size:13px;color:#5F5E5A;margin-top:8px}
.section-title{font-size:13px;font-weight:700;color:#2C2C2A;margin:16px 0 8px}
.sub-card{border:1px solid #e8e8e5;border-radius:6px;padding:12px;margin-bottom:8px}
.sub-card-hdr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
/* Responsive */
@media(max-width:600px){
  .fgrid{grid-template-columns:1fr}
  .fg.full{grid-column:1}
  .dgrid{grid-template-columns:1fr}
  .metrics{grid-template-columns:1fr 1fr}
  .main{padding:14px}
}
</style>
</head>
<body>

<div class="topnav">
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 12h8M12 8v8"/></svg>
    Control de Suscripciones
    <span id="sync-status" style="font-size:11px;font-weight:400;background:rgba(255,255,255,.18);padding:3px 9px;border-radius:20px;margin-left:8px;vertical-align:middle">🟡 Conectando...</span>
  </h1>
  <div class="topnav-actions">
    <button class="btn" style="color:#fff;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.15)" onclick="exportCSV()">⬇ Exportar CSV</button>
    <button class="btn btn-green" style="background:#fff;color:#1D9E75;border-color:#fff" onclick="abrirNuevo()">+ Nueva suscripción</button>
  </div>
</div>

<div class="main">
  <div class="metrics" id="metrics"></div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="clientes" onclick="setTab(this)">Clientes</div>
    <div class="tab" data-tab="activos-cli" onclick="setTab(this)">✅ Clientes activos</div>
    <div class="tab" data-tab="vencen" onclick="setTab(this)">⚠ Vencen pronto</div>
    <div class="tab" data-tab="seguimiento" onclick="setTab(this)">🏆 Seguimiento</div>
  </div>
  <div class="toolbar" id="toolbar">
    <input type="text" id="buscar" placeholder="Buscar nombre o ID..." oninput="render()">
    <select id="fPlan" onchange="render()">
      <option value="">Todos los planes</option>
      <option value="PRUEBA">Prueba</option>
      <option value="SEMANAL">Semanal</option>
      <option value="MENSUAL">Mensual</option>
      <option value="PERSONAL">Personalizado</option>
    </select>
    <select id="fKcal" onchange="render()">
      <option value="">Todas las kcal</option>
      <option value="1500">1500 kcal</option>
      <option value="2000">2000 kcal</option>
    </select>
  </div>
  <div id="content"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
<div class="modal">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <h2 id="modal-title" style="margin:0">Nueva suscripción</h2>
    <button onclick="cerrarModal()" style="background:none;border:none;cursor:pointer;font-size:20px;color:#888780;line-height:1;padding:0">×</button>
  </div>

  <!-- Cliente -->
  <div style="margin-bottom:16px">
    <div class="modal-section-label">👤 Cliente</div>
    <div class="fg full">
      <select id="m-cli" onchange="onCliChange()">
        <option value="">— seleccionar cliente —</option>
        <option value="__nuevo__">+ Nuevo cliente...</option>
      </select>
    </div>
  </div>

  <!-- Nuevo cliente fields -->
  <div id="nuevo-fields" style="display:none;background:#F7F7F5;border-radius:10px;padding:14px;margin-bottom:16px">
    <div class="modal-section-label" style="margin-bottom:10px">📋 Datos del nuevo cliente</div>
    <div class="fgrid">
      <div class="fg full"><label>Nombre completo</label><input type="text" id="m-nombre" placeholder="Nombre y apellido"></div>
      <div class="fg"><label>Teléfono / WhatsApp</label><input type="text" id="m-tel" placeholder="+595 9xx xxx xxx"></div>
      <div class="fg"><label>Horario de entrega</label><input type="text" id="m-horario" placeholder="07:00-08:00"></div>
      <div class="fg full"><label>Dirección</label><input type="text" id="m-dir"></div>
      <div class="fg full">
        <label>Restricciones de menú</label>
        <div class="rinput">
          <input type="text" id="m-ri" placeholder="ej: sin cerdo, sin gluten..." onkeydown="if(event.key==='Enter'){addR();event.preventDefault()}">
          <button class="btn btn-sm" onclick="addR()">+ Agregar</button>
        </div>
        <div class="rtags" id="m-rtags"></div>
      </div>
    </div>
  </div>

  <!-- Plan -->
  <div style="margin-bottom:16px">
    <div class="modal-section-label">📦 Plan</div>
    <div class="fg full">
      <select id="m-plan" onchange="calcFin()">
        <option value="">— seleccionar plan —</option>
        <optgroup label="4 comidas diarias">
          <option value="PRUEBA 1500">Prueba · 1500 kcal · 2 días</option>
          <option value="PRUEBA 2000">Prueba · 2000 kcal · 2 días</option>
          <option value="SEMANAL 1500">Semanal · 1500 kcal · 5 días</option>
          <option value="SEMANAL 2000">Semanal · 2000 kcal · 5 días</option>
          <option value="MENSUAL 1500">Mensual · 1500 kcal · 20 días</option>
          <option value="MENSUAL 2000">Mensual · 2000 kcal · 20 días</option>
          <option value="PERSONALIZADO SEMANAL 1500">Personalizado Semanal · 1500 kcal</option>
          <option value="PERSONALIZADO SEMANAL 2000">Personalizado Semanal · 2000 kcal</option>
          <option value="PERSONALIZADO MENSUAL 1500">Personalizado Mensual · 1500 kcal</option>
          <option value="PERSONALIZADO MENSUAL 2000">Personalizado Mensual · 2000 kcal</option>
        </optgroup>
        <optgroup label="Solo almuerzo y cena">
          <option value="ALMUERZO Y CENA PRUEBA 1500">Prueba · 1500 kcal · 2 días</option>
          <option value="ALMUERZO Y CENA PRUEBA 2000">Prueba · 2000 kcal · 2 días</option>
          <option value="ALMUERZO Y CENA SEMANAL 1500">Semanal · 1500 kcal · 5 días</option>
          <option value="ALMUERZO Y CENA SEMANAL 2000">Semanal · 2000 kcal · 5 días</option>
          <option value="ALMUERZO Y CENA MENSUAL 1500">Mensual · 1500 kcal · 20 días</option>
          <option value="ALMUERZO Y CENA MENSUAL 2000">Mensual · 2000 kcal · 20 días</option>
        </optgroup>
      </select>
    </div>
  </div>

  <!-- Fechas y viandas -->
  <div style="margin-bottom:16px">
    <div class="modal-section-label">📅 Fechas</div>
    <div class="fgrid" style="gap:10px">
      <div class="fg">
        <label>Fecha de inicio</label>
        <input type="date" id="m-inicio" oninput="calcFin()" onchange="calcFin()">
      </div>
      <div class="fg">
        <label>Fecha de fin <span style="font-weight:400;color:#aaa">(automática)</span></label>
        <input type="date" id="m-fin" readonly>
        <div id="m-fin-note" style="font-size:11px;color:#888780;margin-top:2px"></div>
      </div>
      <div class="fg full">
        <label>Viandas ya entregadas <span style="font-weight:400;color:#aaa">(desde el inicio hasta hoy)</span></label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" id="m-entregadas" value="0" min="0" style="width:100px">
          <button type="button" class="btn btn-sm" onclick="recalcularEntregadas()" title="Recalcular automáticamente según días hábiles transcurridos">↻ Recalcular</button>
          <span style="font-size:12px;color:#888780">días lun–vie desde el inicio</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Observaciones -->
  <div style="margin-bottom:4px">
    <div class="modal-section-label">📝 Observaciones</div>
    <div class="fg full">
      <textarea id="m-obs" placeholder="Notas sobre esta suscripción (opcional)..." style="min-height:55px"></textarea>
    </div>
  </div>

  <div class="modal-footer">
    <button class="btn" onclick="cerrarModal()">Cancelar</button>
    <button class="btn btn-green" onclick="guardar()">Guardar</button>
  </div>
</div>
</div>

// ─── SINCRONIZACIÓN EN TIEMPO REAL (Firebase) ────────────────────────────
var FIREBASE_DB_URL='https://yutri-control-de-menu-default-rtdb.firebaseio.com';
var SYNC_PATH='suscripciones_app';
var lastSyncTime=0;
var syncTimeout=null;
var SYNC_DEVICE_ID=Math.random().toString(36).slice(2,8);

function setSyncStatus(state){
  var el=document.getElementById('sync-status');
  if(!el)return;
  if(state==='ok') el.innerHTML='🟢 Sincronizado';
  else if(state==='sync') el.innerHTML='🟡 Guardando...';
  else if(state==='loading') el.innerHTML='🟡 Conectando...';
  else el.innerHTML='🔴 Sin conexión (datos locales)';
}

function persist(){
  try{
    localStorage.setItem('yutri_suscripciones', JSON.stringify(suscripciones));
    localStorage.setItem('yutri_clientes_susc', JSON.stringify(clientes));
    localStorage.setItem('yutri_ventas_importadas', JSON.stringify(ventasImportadas));
    localStorage.setItem('yutri_mapeo_nombres', JSON.stringify(mapeoNombres));
    localStorage.setItem('yutri_no_recibe', JSON.stringify(noRecibe));
  }catch(e){}
  scheduleSync();
}
function loadNoRecibe(){
  try{
    var raw=localStorage.getItem('yutri_no_recibe');
    if(raw){
      var data=JSON.parse(raw);
      var hoy=todayISO();
      var limpio={};
      Object.keys(data).forEach(function(cid){ if(data[cid]===hoy) limpio[cid]=hoy; });
      return limpio;
    }
  }catch(e){}
  return {};
}
function scheduleSync(){
  setSyncStatus('sync');
  clearTimeout(syncTimeout);
  syncTimeout=setTimeout(subirAFirebase,800);
}
function subirAFirebase(){
  var payload={
    clientes:clientes,
    suscripciones:suscripciones,
    ventasImportadas:ventasImportadas,
    mapeoNombres:mapeoNombres,
    updatedAt:Date.now(),
    updatedBy:SYNC_DEVICE_ID
  };
  fetch(FIREBASE_DB_URL+'/'+SYNC_PATH+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
    .then(function(r){ if(!r.ok) throw new Error('http '+r.status); setSyncStatus('ok'); })
    .catch(function(){ setSyncStatus('offline'); });
}
function aplicarDatosRemotos(data){
  clientes=data.clientes||clientes;
  suscripciones=data.suscripciones||suscripciones;
  ventasImportadas=data.ventasImportadas||ventasImportadas;
  mapeoNombres=data.mapeoNombres||mapeoNombres;
  suscripciones.forEach(function(s){ if(!s.pausas) s.pausas=[]; });
  clientes.forEach(function(c){ if(!('notas' in c)) c.notas=''; });
  lastSyncTime=data.updatedAt||Date.now(); // actualizar marca de tiempo al recibir
  try{
    localStorage.setItem('yutri_suscripciones', JSON.stringify(suscripciones));
    localStorage.setItem('yutri_clientes_susc', JSON.stringify(clientes));
    localStorage.setItem('yutri_ventas_importadas', JSON.stringify(ventasImportadas));
    localStorage.setItem('yutri_mapeo_nombres', JSON.stringify(mapeoNombres));
  }catch(e){}
}
function cargarDesdeFirebase(inicial){
  fetch(FIREBASE_DB_URL+'/'+SYNC_PATH+'.json')
    .then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.json(); })
    .then(function(data){
      if(data){
        var esMio=data.updatedBy===SYNC_DEVICE_ID;
        var esNuevo=data.updatedAt && data.updatedAt>lastSyncTime;
        // Aplicar si: es carga inicial, o hay datos más nuevos de OTRO dispositivo
        if(inicial || (!esMio && esNuevo)){
          aplicarDatosRemotos(data);
          renderMetrics();
          try{ currentView(); }catch(e){ currentView=render; render(); }
        }
      } else if(inicial){
        subirAFirebase();
      }
      setSyncStatus('ok');
    })
    .catch(function(){ setSyncStatus('offline'); });
}
function iniciarSincronizacion(){
  setSyncStatus('loading');
  cargarDesdeFirebase(true);
  setInterval(function(){
    if(document.getElementById('overlay')&&document.getElementById('overlay').classList.contains('open')) return;
    cargarDesdeFirebase(false);
  },15000);
}

function entregadasEf(s){ return Math.max(0,(s.entregadas||0)); }
function estado(s){return entregadasEf(s)>=s.total?'Finalizada':'Activa'}
function diasR(fin){var h=new Date();h.setHours(0,0,0,0);return Math.round((new Date(fin)-h)/864e5)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function addDias(dateStr,n){var d=new Date(dateStr+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function addWeekdays(startStr,n){
  // devuelve la fecha del enésimo día lunes-viernes contando desde startStr
  // (si startStr es lunes-viernes, cuenta como día 1)
  var d=new Date(startStr+'T00:00:00');
  var count=0;
  while(count<n){
    var dow=d.getDay();
    if(dow>=1&&dow<=5) count++;
    if(count<n) d.setDate(d.getDate()+1);
  }
  return d.toISOString().slice(0,10);
}
function addWeekdaysAfter(dateStr,n){
  // devuelve la fecha que está n días lunes-viernes DESPUÉS de dateStr (sin contar dateStr)
  if(!n) return dateStr;
  var d=new Date(dateStr+'T00:00:00');
  var count=0;
  while(count<n){
    d.setDate(d.getDate()+1);
    var dow=d.getDay();
    if(dow>=1&&dow<=5) count++;
  }
  return d.toISOString().slice(0,10);
}
function finEfectivo(s){
  var n=(s.pausas||[]).length;
  return n? addWeekdaysAfter(s.fin,n) : s.fin;
}
function getC(cid){return clientes.find(c=>c.id===cid)||{id:cid,nombre:cid,tel:'',horario:'',dir:'',restr:[],obs:''}}
function getUltimaSub(cid){
  var subs=suscripciones.filter(function(s){return s.cid===cid});
  if(!subs.length) return null;
  subs=subs.slice().sort(function(a,b){return finEfectivo(b).localeCompare(finEfectivo(a))});
  return subs[0];
}
function clienteActivo(s){

}

}

function render(){
  currentView=render;
  renderMetrics();
  if(currentTab==='seguimiento'){renderSeguimiento();return}
  if(currentTab==='activos-cli'){renderClientesLista('activos');return}
  if(currentTab==='vencen'){renderClientesLista('vencen');return}
  renderClientesLista('todos');
}

function regEntrega(sid){
  var s=suscripciones.find(function(x){return x.id===sid});
  if(!s||estado(s)==='Finalizada')return;
  if(entregadasEf(s)<s.total)s.entregadas=(s.entregadas||0)+1;
  persist();render();
}

// ─── DÍAS NO RECIBIDOS (PAUSAS) ──────────────────────────────────────────
function renderPausasBlock(s){
  var pausas=(s.pausas||[]).slice().sort();
  var h='<div class="info-box" style="margin-top:10px">';
  h+='<div style="font-weight:700;margin-bottom:6px">📅 Días no recibidos</div>';
  if(pausas.length){
    h+='<div style="margin-bottom:8px">';
    pausas.forEach(function(p){
      h+='<span class="badge b-vence" style="margin-right:6px;margin-bottom:4px;display:inline-flex;align-items:center;gap:5px">'+p+' <button onclick="removePausa(\''+s.id+'\',\''+p+'\')" style="background:none;border:none;cursor:pointer;color:#993C1D;font-size:13px;line-height:1;padding:0">×</button></span>';
    });
    h+='</div>';
    h+='<div style="font-size:12px;color:#888780">El plan se extiende '+pausas.length+' día'+(pausas.length>1?'s':'')+' (fin original '+s.fin+' → fin actual '+finEfectivo(s)+'). El cliente tiene '+entregadasEf(s)+' de '+s.total+' viandas entregadas.</div>';
  } else {
    h+='<div style="font-size:12px;color:#888780;margin-bottom:8px">Sin días marcados. Si el cliente avisa que no recibe un día, agregalo acá y el plan se extiende automáticamente.</div>';
  }
  h+='<div style="display:flex;gap:8px;margin-top:8px;align-items:center">'+
    '<input type="date" id="pausa-fecha-'+s.id+'" style="padding:6px 8px;border:1px solid #ccc;border-radius:6px;font-family:Arial,sans-serif;font-size:13px">'+
    '<button class="btn btn-sm" onclick="addPausa(\''+s.id+'\')">+ Agregar día no recibido</button>'+
  '</div>';

}
function addPausa(sid){
  var s=suscripciones.find(function(x){return x.id===sid});
  if(!s)return;
  var input=document.getElementById('pausa-fecha-'+sid);
  var fecha=input.value;
  if(!fecha){alert('Seleccioná una fecha.');return}
  if(!s.pausas) s.pausas=[];
  if(s.pausas.includes(fecha)){alert('Esa fecha ya está marcada.');return}
  s.pausas.push(fecha);
  persist();verDetalle(sid);
}
function removePausa(sid,fecha){
  var s=suscripciones.find(function(x){return x.id===sid});
  if(!s)return;
  s.pausas=(s.pausas||[]).filter(function(p){return p!==fecha});
  persist();verDetalle(sid);
}

// ─── SEGUIMIENTO DE CLIENTES ─────────────────────────────────────────────
function fmtGs(n){ n=Math.round(n||0); return 'Gs ' + n.toLocaleString('es-PY'); }
function norm(s){return (s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}

function nombresUnicosHistorial(){
  var set={};
  HISTORIAL_PAGOS.forEach(function(r){ set[r.nombre]=true; });
  return Object.keys(set).sort();
}
function totalHistorialPorCid(cid){
  var total=0;
  HISTORIAL_PAGOS.forEach(function(r){
    if(mapeoNombres[r.nombre]===cid) total+=r.monto;
  });
  return total;
}
function countHistorialPorCid(cid){
  var c=0;
  HISTORIAL_PAGOS.forEach(function(r){ if(mapeoNombres[r.nombre]===cid) c++; });
  return c;
}

function renderSeguimiento(){
  var totalImportado=ventasImportadas.length;
  var fechaImport=localStorage.getItem('yutri_ventas_import_fecha')||'';

  // Agrupar suscripciones por cliente
  var byCliente={};
  suscripciones.forEach(function(s){
    var c=getC(s.cid);
    if(!byCliente[s.cid]) byCliente[s.cid]={cliente:c,subs:[],totalGastado:0,planesCount:{}};
    byCliente[s.cid].subs.push(s);
    var planSimple=planTipo(s.plan);
    byCliente[s.cid].planesCount[planSimple]=(byCliente[s.cid].planesCount[planSimple]||0)+1;
  });

  // Cruzar con ventas importadas por nombre de cliente
  Object.keys(byCliente).forEach(function(cid){
    var nombre=norm(byCliente[cid].cliente.nombre);
    var matched=ventasImportadas.filter(function(v){return norm(v.cliente)===nombre});
    var totalVentas=matched.reduce(function(a,v){return a+(parseFloat(v.monto)||0)},0);
    var totalHist=totalHistorialPorCid(cid);
    byCliente[cid].totalGastado=totalVentas+totalHist;
    byCliente[cid].ventasMatch=matched.length;
    byCliente[cid].histMatch=countHistorialPorCid(cid);
  });

  var list=Object.keys(byCliente).map(function(cid){return byCliente[cid]});
  list.sort(function(a,b){
    if(b.totalGastado!==a.totalGastado) return b.totalGastado-a.totalGastado;
    return b.subs.length-a.subs.length;
  });

  var totalGeneral=sum(list,'totalGastado');
  var totalRenovaciones=list.reduce(function(a,c){return a+c.subs.length},0);

  // pendientes de mapeo
  var nombresHist=nombresUnicosHistorial();
  var pendientes=nombresHist.filter(function(n){return !mapeoNombres[n]});

  var h = '<h2 style="font-size:18px;font-weight:700;margin-bottom:4px">Seguimiento de clientes</h2>';
  h += '<div style="font-size:13px;color:#888780;margin-bottom:18px">Renovaciones, planes comprados y monto total generado por cliente (incluye libro de ventas + historial enero-mayo).</div>';

  h += '<div class="metrics" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px">'+
    '<div class="metric"><div class="lbl">Clientes con historial</div><div class="val">'+list.length+'</div></div>'+
    '<div class="metric"><div class="lbl">Total suscripciones</div><div class="val">'+totalRenovaciones+'</div></div>'+
    '<div class="metric"><div class="lbl">Total generado</div><div class="val" style="color:#1D9E75">'+fmtGs(totalGeneral)+'</div></div>'+
  '</div>';

  h += '<div class="filters" style="margin-bottom:14px"><div style="font-size:13px;color:#5F5E5A">'+
    (totalImportado?('📁 Ventas importadas: <strong>'+totalImportado+'</strong> registros'+(fechaImport?' (importado el '+fechaImport+')':'')):'⚠ No hay ventas importadas del sistema financiero.')+
    '</div>'+
    '<label class="btn" style="cursor:pointer">⬆ Importar ventas (JSON del financiero)<input type="file" id="import-ventas-file" accept=".json" style="display:none" onchange="importVentasFinanciero(event)"></label>'+
    (totalImportado?'<button class="btn" onclick="limpiarVentasImportadas()">🗑 Limpiar importación</button>':'')+
  '</div>';

  if(pendientes.length){
    h += '<div class="card" style="background:#FAEEDA;border-color:#F0D9B0;margin-bottom:14px;padding:14px 16px;border-radius:8px;border:1px solid">';
    h += '<div style="font-weight:700;margin-bottom:6px">📋 Historial enero-mayo: '+pendientes.length+' nombre(s) sin asignar a un cliente</div>';
    h += '<div style="font-size:12px;color:#888780;margin-bottom:10px">Estos pagos vienen de la planilla que cargaste. Asigná cada nombre al cliente correspondiente para que se sumen a su total. Si no corresponde a ningún cliente (ej: agencias, terceros), elegí "Ignorar".</div>';
    h += '<table><thead><tr><th>Nombre en planilla</th><th>Pagos</th><th class="num">Total</th><th>Asignar a</th></tr></thead><tbody>';
    pendientes.forEach(function(n){
      var regs=HISTORIAL_PAGOS.filter(function(r){return r.nombre===n});
      var total=sum(regs,'monto');
      h+='<tr><td>'+n+'</td><td>'+regs.length+'</td><td class="num">'+fmtGs(total)+'</td>'+
        '<td><select onchange="asignarNombre(\''+n.replace(/'/g,"\\'")+'\',this.value)" style="padding:5px 8px;border:1px solid #ccc;border-radius:6px;font-family:Arial,sans-serif;font-size:12px">'+
        '<option value="">— elegir —</option>'+
        '<option value="__ignorar__">Ignorar (no es cliente)</option>'+
        clientes.map(function(c){return '<option value="'+c.id+'">'+c.nombre+'</option>'}).join('')+
        '</select></td></tr>';
    });
    h += '</tbody></table>';
    h += '</div>';
  }

  if(!list.length){
    h += '<div class="empty">No hay suscripciones registradas todavía.</div>';
  } else {
    h += '<table><thead><tr><th>Cliente</th><th class="num">Renovaciones</th><th>Planes comprados</th><th class="num">Total generado</th><th></th></tr></thead><tbody>';
    list.forEach(function(item){
      var c=item.cliente;
      var planesHtml=Object.keys(item.planesCount).map(function(p){
        var cls=p==='PRUEBA'?'b-prueba':p==='SEMANAL'?'b-semanal':p==='MENSUAL'?'b-mensual':'b-personal';
        return '<span class="badge '+cls+'" style="margin-right:4px">'+p.charAt(0)+p.slice(1).toLowerCase()+' ×'+item.planesCount[p]+'</span>';
      }).join('');
      var destacado=item.subs.length>=4?' 🌟':'';
      var detalleFuentes=[];
      if(item.ventasMatch) detalleFuentes.push(item.ventasMatch+' del financiero');
      if(item.histMatch) detalleFuentes.push(item.histMatch+' del historial ene-may');
      h+='<tr>'+
        '<td><strong>'+c.nombre+destacado+'</strong><br><span style="font-size:11px;color:#888780">'+c.id+'</span></td>'+
        '<td class="num" style="font-weight:700">'+item.subs.length+'</td>'+
        '<td style="white-space:normal;line-height:1.8">'+planesHtml+'</td>'+
        '<td class="num" style="font-weight:700;'+(item.totalGastado>0?'color:#1D9E75':'color:#aaa')+'">'+fmtGs(item.totalGastado)+(detalleFuentes.length?'<br><span style="font-size:10px;color:#aaa;font-weight:400">'+detalleFuentes.join(' + ')+'</span>':'')+'</td>'+
        '<td><button class="btn btn-sm" onclick="historialCliente(\''+c.id+'\')">Ver historial</button></td>'+
        '</tr>';
    });
    h += '</tbody></table>';
    h += '<div style="font-size:11px;color:#aaa;margin-top:10px">🌟 = clientes con 4 o más suscripciones registradas (candidatos a beneficios de fidelidad).</div>';
  }

  document.getElementById('content').innerHTML=h;
}
function asignarNombre(nombrePlanilla,cid){
  if(!cid)return;
  mapeoNombres[nombrePlanilla]=cid;
  persist();
  renderSeguimiento();
}
function importVentasFinanciero(ev){
  var file=ev.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var imported=JSON.parse(e.target.result);
      if(!imported.ventas || !Array.isArray(imported.ventas)){
        alert('El archivo no parece ser una exportación válida del sistema financiero (falta el campo "ventas").');
        return;
      }
      ventasImportadas=imported.ventas.map(function(v){return {cliente:v.cliente,monto:v.monto,fecha:v.fecha,plan:v.plan}});
      localStorage.setItem('yutri_ventas_import_fecha', todayISO());
      persist();
      renderSeguimiento();
      alert('Se importaron '+ventasImportadas.length+' ventas correctamente.');
    }catch(err){
      alert('Error al leer el archivo. Asegurate de exportar el JSON desde el sistema financiero (Yutri Finanzas).');
    }
  };
  reader.readAsText(file);
  ev.target.value='';
}
function limpiarVentasImportadas(){
  if(!confirm('¿Quitar las ventas importadas? El seguimiento volverá a mostrar Gs 0 hasta que importes de nuevo.'))return;
  ventasImportadas=[];
  localStorage.removeItem('yutri_ventas_import_fecha');
  persist();
  renderSeguimiento();
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function sum(arr,key){ return arr.reduce(function(a,b){return a+(parseFloat(b[key])||0)},0); }

    '<td style="white-space:normal;line-height:1.8">'+restrHtml+'</td>'+
    '<td>'+notaInput+'</td>'+
    '<td class="nowrap">'+ordenBtns+verBtn+accionesExtra+'<button class="btn btn-sm btn-danger" onclick="delCliente(\''+c.id+'\')">🗑</button></td>'+
    '</tr>';
}

function renderClientesLista(mode){
  var q=(document.getElementById('buscar')||{}).value.toLowerCase();
  var fp=(document.getElementById('fPlan')||{}).value;
  var fk=(document.getElementById('fKcal')||{}).value;

  var rows=[];
  clientes.forEach(function(c){
    var s=getUltimaSub(c.id);
    if(mode==='activos'&&!clienteActivo(s)) return;
    if(mode==='vencen'){
      if(!clienteActivo(s)) return;
      var d=diasR(finEfectivo(s));
      if(!(d>=0&&d<=3)) return;
    }
    if(q && !c.nombre.toLowerCase().includes(q) && !c.id.toLowerCase().includes(q)) return;
    if(fp){ if(!s||planTipo(s.plan)!==fp) return; }
    if(fk){ if(!s||planKcal(s.plan)!==fk) return; }
    rows.push({c:c,s:s});
  });

  var showOrder=(mode==='todos'&&!q&&!fp&&!fk);
  if(mode==='activos'||mode==='vencen'){
    rows.sort(function(a,b){return diasR(finEfectivo(a.s))-diasR(finEfectivo(b.s))});
  }

  var h='';
  if(mode==='activos') h='<div style="font-size:13px;color:#888780;margin-bottom:12px">Clientes con un plan activo actualmente, ordenados por los que vencen antes.</div>';
  else if(mode==='vencen') h='<div style="font-size:13px;color:#888780;margin-bottom:12px">Clientes activos cuyo plan vence en los próximos 3 días.</div>';
  else if(showOrder) h='<div style="font-size:12px;color:#888780;margin-bottom:8px">⠿ Arrastrá una fila para reordenarla, o usá las flechas ↑ ↓. El orden se guarda automáticamente.</div>';
  else h='<div style="font-size:12px;color:#888780;margin-bottom:8px">Para reordenar clientes, primero borrá el texto del buscador y los filtros.</div>';

  if(!rows.length){
    h+='<div class="empty">No hay clientes para mostrar con esos filtros.</div>';
    document.getElementById('content').innerHTML=h;
    return;
  }

  h+='<table><thead><tr>'+(mode==='todos'?'<th></th>':'')+'<th>Cliente</th><th>Plan</th><th>Estado</th><th>Progreso</th><th>Vencimiento</th><th>Días</th><th>Restricciones</th><th>Notas</th><th>Acciones</th></tr></thead><tbody>';
  rows.forEach(function(r,i){
    h+=clienteRowHtml(r.c,r.s,{
      showDragHandle:(mode==='todos'),
      showOrder:showOrder,
      draggable:showOrder,
      first:i===0,
      last:i===rows.length-1
    });
  });
  h+='</tbody></table>';
  document.getElementById('content').innerHTML=h;
}
function moveCliente(cid,dir){
  var idx=clientes.findIndex(function(c){return c.id===cid});
  if(idx<0)return;
  var newIdx=idx+dir;
  if(newIdx<0||newIdx>=clientes.length)return;
  var tmp=clientes[idx];
  clientes[idx]=clientes[newIdx];
  clientes[newIdx]=tmp;
  persist();
  render();
}
function dropOnCliente(ev,targetCid){
  ev.preventDefault();
  if(!dragCid||dragCid===targetCid)return;
  var fromIdx=clientes.findIndex(function(c){return c.id===dragCid});
  if(fromIdx<0)return;
  var item=clientes.splice(fromIdx,1)[0];
  var toIdx=clientes.findIndex(function(c){return c.id===targetCid});
  clientes.splice(toIdx+1,0,item);
  dragCid=null;
  persist();
  render();
}
function delCliente(cid){
  var c=getC(cid);
  var subs=suscripciones.filter(function(s){return s.cid===cid});
  var msg='¿Eliminar al cliente "'+c.nombre+'" ('+cid+')?';
  if(subs.length){
    msg+='\n\nTiene '+subs.length+' suscripción(es) registrada(s). Se eliminarán también.';
  }
  msg+='\n\nEsta acción no se puede deshacer.';
  if(!confirm(msg))return;
  clientes=clientes.filter(function(x){return x.id!==cid});
  suscripciones=suscripciones.filter(function(s){return s.cid!==cid});
  persist();
  render();
}

function historialCliente(cid){
  currentView=function(){historialCliente(cid)};
  var c=getC(cid);
  var subs=suscripciones.filter(function(s){return s.cid===cid}).slice().sort(function(a,b){return b.inicio.localeCompare(a.inicio)});
  var ini=c.nombre.split(' ').map(function(w){return w[0]}).slice(0,2).join('').toUpperCase();
  var restrHtml=c.restrTexto?'<span style="font-size:13px;color:#5F5E5A">'+c.restrTexto+'</span>':(c.restr&&c.restr.length?c.restr.map(function(r){return '<span class="badge b-personal">'+r+'</span>'}).join(' '):'Sin restricciones');
  var subsHtml=subs.length?subs.map(function(s){
    var dr=diasR(finEfectivo(s));var est=estado(s);
    var estB=est==='Activa'?(dr<=0?'<span class="badge b-hoy">Vencida</span>':dr<=3?'<span class="badge b-vence">'+dr+'d</span>':'<span class="badge b-activa">Activa</span>'):'<span class="badge b-finalizada">Finalizada</span>';
    return '<div class="sub-card"><div class="sub-card-hdr">'+planBadge(s.plan)+estB+'<span style="font-size:11px;color:#888780;margin-left:auto">'+s.inicio+' → '+finEfectivo(s)+'</span></div><div style="font-size:12px;color:#5F5E5A">'+entregadasEf(s)+'/'+s.total+' viandas'+(s.obs?' · '+s.obs:'')+'</div></div>';
  }).join(''):'<p style="font-size:13px;color:#aaa;padding:8px 0">Sin suscripciones registradas.</p>';
  document.getElementById('content').innerHTML=
    '<button class="btn" onclick="render()" style="margin-bottom:14px">← Volver</button>'+
    '<div class="detail">'+
      '<div class="detail-hdr"><div class="avatar">'+ini+'</div><div><div style="font-size:16px;font-weight:700">'+c.nombre+'</div><div style="font-size:12px;color:#888780">'+c.id+' · '+(c.tel||'sin tel.')+'</div></div></div>'+
      '<div class="dgrid"><div><div class="dk">Dirección</div><input type="text" value="'+(c.dir||'').replace(/"/g,'&quot;')+'" placeholder="Agregar dirección..." onchange="updateClienteField(\''+c.id+'\',\'dir\',this.value)" style="width:100%;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-family:Arial,sans-serif;font-size:12px;font-weight:600;color:#2C2C2A"></div><div><div class="dk">Horario entrega</div><input type="text" value="'+(c.horario||'').replace(/"/g,'&quot;')+'" placeholder="ej: 07:00-08:00" onchange="updateClienteField(\''+c.id+'\',\'horario\',this.value)" style="width:100%;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-family:Arial,sans-serif;font-size:13px;font-weight:600;color:#2C2C2A"></div></div>'+
      '<div style="margin-bottom:12px"><div class="dk" style="margin-bottom:5px">Restricciones</div>'+restrHtml+'</div>'+
      (c.obs?'<div class="info-box" style="margin-bottom:12px">'+c.obs+'</div>':'')+
      '<div style="margin-bottom:12px"><div class="dk" style="margin-bottom:5px">Notas internas</div><textarea onchange="updateNotaCliente(\''+c.id+'\',this.value)" placeholder="Notas sobre este cliente (preferencias, pedidos especiales, etc.)" style="width:100%;min-height:60px;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-family:Arial,sans-serif;font-size:13px;resize:vertical">'+(c.notas||'')+'</textarea></div>'+
      '<div style="margin-top:14px;padding-top:14px;border-top:1px solid #f0f0ee"><button class="btn btn-sm btn-danger" onclick="delCliente(\''+c.id+'\')">🗑 Eliminar cliente</button></div>'+
    '</div>'+
    '<div class="section-title">Suscripciones ('+subs.length+')</div>'+
    subsHtml;
}

function setTab(el){currentTab=el.dataset.tab;document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});el.classList.add('active');render()}
function setTabByName(name){currentTab=name;document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===name)});render()}

// ─── MODAL ───────────────────────────────────────────────────────────────
function poblarSelect(){
  var sel=document.getElementById('m-cli');
  var v=sel.value;
  sel.innerHTML='<option value="">— seleccionar —</option><option value="__nuevo__">+ Nuevo cliente...</option>';
  clientes.forEach(function(c){sel.insertAdjacentHTML('beforeend','<option value="'+c.id+'">'+c.nombre+' ('+c.id+')</option>')});
  if(v)sel.value=v;
}
function onCliChange(){document.getElementById('nuevo-fields').style.display=document.getElementById('m-cli').value==='__nuevo__'?'block':'none'}
function weekdaysBetween(startStr,endStr){
  // cuenta días de lunes a viernes en [startStr, endStr) — start incluido, end excluido
  var start=new Date(startStr+'T00:00:00');
  var end=new Date(endStr+'T00:00:00');
  var count=0;
  var d=new Date(start);
  while(d<end){
    var dow=d.getDay();
    if(dow>=1&&dow<=5) count++;
    d.setDate(d.getDate()+1);
  }
  return count;
}
function calcFin(){
  var p=document.getElementById('m-plan').value.toUpperCase();
  var ini=document.getElementById('m-inicio').value;
  if(!ini)return;
  var dias=p.includes('MENSUAL')?20:p.includes('SEMANAL')?5:2;
  document.getElementById('m-fin').value=addWeekdays(ini,dias);
  autoEntregadas();
}
function computeEntregadas(){
  var ini=document.getElementById('m-inicio').value;
  var plan=document.getElementById('m-plan').value;
  if(!ini||!plan) return null;
  var total=calcViandas(plan);
  var hoy=todayISO();
  var entregadas=weekdaysBetween(ini,hoy);
  if(entregadas<0) entregadas=0;
  if(entregadas>total) entregadas=total;
  return entregadas;
}
function autoEntregadas(){
  // Llamado automáticamente al elegir plan/fecha en una suscripción nueva
  if(editId) return;
  var val=computeEntregadas();
  if(val!==null) document.getElementById('m-entregadas').value=val;
}
function recalcularEntregadas(){
  // Llamado manualmente con el botón ↻, funciona siempre (incluso editando)
  var val=computeEntregadas();
  if(val===null){ alert('Elegí el plan y la fecha de inicio primero.'); return; }
  document.getElementById('m-entregadas').value=val;
}
function addR(){var inp=document.getElementById('m-ri');var v=inp.value.trim();if(v&&!tmpR.includes(v)){tmpR.push(v);renderRTags()}inp.value=''}
function removeR(i){tmpR.splice(i,1);renderRTags()}
function renderRTags(){document.getElementById('m-rtags').innerHTML=tmpR.map(function(r,i){return '<span class="rtag">'+r+'<button onclick="removeR('+i+')" aria-label="quitar">×</button></span>'}).join('')}
function abrirNuevo(){
  editId=null;tmpR=[];
  document.getElementById('modal-title').textContent='Nueva suscripción';
  ['m-plan','m-inicio','m-fin','m-obs'].forEach(function(id){document.getElementById(id).value=''});
  document.getElementById('m-fin-note').textContent='';
  document.getElementById('m-entregadas').value=0;
  document.getElementById('nuevo-fields').style.display='none';
  ['m-nombre','m-tel','m-horario','m-dir'].forEach(function(id){document.getElementById(id).value=''});
  renderRTags();poblarSelect();document.getElementById('m-cli').value='';
  document.getElementById('overlay').classList.add('open');
}
function editSub(sid){
  var s=suscripciones.find(function(x){return x.id===sid});if(!s)return;
  editId=sid;tmpR=[];
  document.getElementById('modal-title').textContent='Editar suscripción';
  poblarSelect();
  document.getElementById('m-cli').value=s.cid;
  document.getElementById('nuevo-fields').style.display='none';
  document.getElementById('m-plan').value=s.plan;
  document.getElementById('m-inicio').value=s.inicio;
  document.getElementById('m-fin').value=s.fin;
  var npausas=(s.pausas||[]).length;
  document.getElementById('m-fin-note').textContent=npausas?('Fin real con días no recibidos: '+finEfectivo(s)+' (esta fecha de arriba es la base del plan sin contarlos)'):'';
  document.getElementById('m-entregadas').value=s.entregadas;
  document.getElementById('m-obs').value=s.obs||'';
  renderRTags();document.getElementById('overlay').classList.add('open');
}
function renovar(sid){
  var s=suscripciones.find(function(x){return x.id===sid});if(!s)return;
  editId=null;tmpR=[];
  var c=getC(s.cid);
  document.getElementById('modal-title').textContent='Renovar — '+c.nombre;
  poblarSelect();
  document.getElementById('m-cli').value=s.cid;
  document.getElementById('nuevo-fields').style.display='none';
  document.getElementById('m-plan').value=s.plan;
  document.getElementById('m-inicio').value=new Date().toISOString().slice(0,10);
  document.getElementById('m-entregadas').value=0;
  document.getElementById('m-obs').value='';
  document.getElementById('m-fin-note').textContent='';
  calcFin();renderRTags();document.getElementById('overlay').classList.add('open');
}
function cerrarModal(){document.getElementById('overlay').classList.remove('open')}
function generarNuevoId(){
  var maxNum=0;
  clientes.forEach(function(c){
    var m=String(c.id).match(/(\d+)/);
    if(m){ var n=parseInt(m[1],10); if(n>maxNum) maxNum=n; }
  });
  return 'Y'+String(maxNum+1).padStart(4,'0');
}
function guardar(){
  var cid=document.getElementById('m-cli').value;
  var plan=document.getElementById('m-plan').value;
  var inicio=document.getElementById('m-inicio').value;
  var fin=document.getElementById('m-fin').value;
  var entregadas=parseInt(document.getElementById('m-entregadas').value)||0;
  var obs=document.getElementById('m-obs').value;
  if(!plan||!inicio){alert('Completá plan y fecha de inicio.');return}
  var isNew=!editId;
  var newSubId=null;
  if(cid==='__nuevo__'){
    var nombre=document.getElementById('m-nombre').value.trim();
    if(!nombre){alert('Escribí el nombre del cliente.');return}
    // chequeo de duplicados por nombre
    var existente=clientes.find(function(c){return norm(c.nombre)===norm(nombre)});
    if(existente){
      var usar=confirm('Ya existe un cliente llamado "'+existente.nombre+'" ('+existente.id+').\n\n¿Querés usar ese cliente en vez de crear uno nuevo?\n\nAceptar = usar el existente\nCancelar = crear uno nuevo de todas formas (si son personas distintas)');
      if(usar){
        cid=existente.id;
      } else {
        var newId=generarNuevoId();
        clientes.push({id:newId,nombre:nombre,tel:document.getElementById('m-tel').value,horario:document.getElementById('m-horario').value,dir:document.getElementById('m-dir').value,restr:tmpR.slice(),obs:'',notas:''});
        cid=newId;
      }
    } else {
      var newId2=generarNuevoId();
      clientes.push({id:newId2,nombre:nombre,tel:document.getElementById('m-tel').value,horario:document.getElementById('m-horario').value,dir:document.getElementById('m-dir').value,restr:tmpR.slice(),obs:'',notas:''});
      cid=newId2;
    }
    newSubId=uid();
    suscripciones.unshift({id:newSubId,cid:cid,plan:plan,inicio:inicio,fin:fin,total:calcViandas(plan),entregadas:entregadas,obs:obs,pausas:[]});
  } else if(editId){
    var idx=suscripciones.findIndex(function(x){return x.id===editId});
    if(idx>=0){
      suscripciones[idx]=Object.assign(suscripciones[idx],{plan:plan,inicio:inicio,fin:fin,total:calcViandas(plan),entregadas:entregadas,obs:obs});
      newSubId=suscripciones[idx].id;
    }
  } else {
    if(!cid){alert('Seleccioná un cliente.');return}
    newSubId=uid();
    suscripciones.unshift({id:newSubId,cid:cid,plan:plan,inicio:inicio,fin:fin,total:calcViandas(plan),entregadas:entregadas,obs:obs,pausas:[]});
  }
  cerrarModal();persist();
  if(isNew&&newSubId){
    // limpiar filtros/búsqueda para que la nueva suscripción sea visible, y mostrarla directamente
    var bEl=document.getElementById('buscar'); if(bEl) bEl.value='';
    var pEl=document.getElementById('fPlan'); if(pEl) pEl.value='';
    var kEl=document.getElementById('fKcal'); if(kEl) kEl.value='';
    verDetalle(newSubId);
  } else {
    render();
  }
}

// ─── EXPORT CSV ──────────────────────────────────────────────────────────
function exportCSV(){
  var headers=['ID Cliente','Nombre','Teléfono','Horario','Dirección','Restricciones','Plan','Kcal','Inicio','Fin','Total','Entregadas (registradas)','Entregadas efectivas','Restantes','Estado','Observaciones','Días no recibidos'];
  var rows=suscripciones.map(function(s){
    var c=getC(s.cid);
    var ef=entregadasEf(s);
    return [s.cid,c.nombre,c.tel||'',c.horario||'',c.dir||'',(c.restr||[]).join('; '),s.plan,planKcal(s.plan),s.inicio,finEfectivo(s),s.total,s.entregadas,ef,s.total-ef,estado(s),s.obs||'',(s.pausas||[]).join('; ')];
  });
  var csv=[headers].concat(rows).map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"'}).join(',')}).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent('\uFEFF'+csv);
  a.download='suscripciones.csv';a.click();
}
